name: Build Arcanus OS ISO

on:
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Linux Mint ISO download URL (leave blank to use default)'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - 'branding/**'
      - 'theme/**'
      - 'scripts/**'
      - '.github/workflows/build-iso.yml'

permissions:
  contents: read
  actions: write

jobs:
  build-iso:
    name: Remaster Linux Mint with Arcanus Branding
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            squashfs-tools \
            mkisofs \
            xorriso \
            rsync \
            sudo

      - name: Download Linux Mint 22 ISO
        run: |
          mkdir -p downloads
          
          # Try multiple mirrors
          ISO_URL="${{ github.event.inputs.iso_url }}"
          
          if [ -z "$ISO_URL" ]; then
            # Try primary mirror first
            ISO_URL="https://mirror.math.princeton.edu/pub/linuxmint/stable/22/linuxmint-22-xfce-64bit.iso"
          fi
          
          echo "📥 Downloading from: $ISO_URL"
          
          if ! wget -O downloads/linuxmint-22-64bit.iso "$ISO_URL" --progress=bar:force:noscroll --timeout=30; then
            echo "⚠️  Primary mirror failed, trying alternate..."
            wget -O downloads/linuxmint-22-64bit.iso \
              "https://ftp.lip6.fr/pub/linux/distributions/linuxmint/stable/22/linuxmint-22-xfce-64bit.iso" \
              --progress=bar:force:noscroll --timeout=30 || \
            wget -O downloads/linuxmint-22-64bit.iso \
              "https://linuxmint.com/downloads/linuxmint-22-xfce-64bit.iso" \
              --progress=bar:force:noscroll --timeout=30
          fi
          
          ls -lh downloads/

      - name: Build Arcanus OS ISO
        run: |
          chmod +x scripts/remaster-iso.sh
          mkdir -p dist
          
          # Find the ISO file (should be linuxmint-22-64bit.iso)
          ISO_FILE=$(ls downloads/*.iso 2>/dev/null | head -1)
          
          if [ -z "$ISO_FILE" ]; then
            echo "❌ No ISO file found in downloads/"
            exit 1
          fi
          
          echo "🔧 Using ISO: $ISO_FILE"
          sudo ./scripts/remaster-iso.sh "$ISO_FILE" dist/

      - name: Verify ISO
        run: |
          ls -lh dist/
          file dist/arcanus-os-demo.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcanus-os-demo-iso
          path: dist/arcanus-os-demo.iso
          retention-days: 30

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/arcanus-os-demo.iso
          body: |
            # Arcanus OS ${{ github.ref_name }}
            
            **Linux Mint 22 XFCE** remastered with Arcanus branding.
            
            ## What's Included
            - Full Linux Mint 22 functionality
            - Arcanus visual branding (logo, wallpaper, icons)
            - Pre-installed Arcanus Ledger
            - Ready to test in VirtualBox/QEMU
            
            ## Quick Test
            ```bash
            qemu-system-x86_64 -cdrom arcanus-os-demo.iso -m 4G -smp 2
            ```
            
            ## Build Info
            - Built: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Commit: ${{ github.sha }}
