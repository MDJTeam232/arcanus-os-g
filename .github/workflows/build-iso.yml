# ==============================================================================
#      ARCANUS OS CI/CD PIPELINE (DEBIAN 12 REMASTER COMPILATION CORE)
# ==============================================================================
name: Compile Arcanus OS Debian Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Cloning Arcanus Repository Source
        uses: actions/checkout@v4

      - name: 🔒 Configuring Host Environment Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            rsync \
            xorriso \
            syslinux \
            isolinux \
            wget \
            debootstrap \
            qemu-user-static

      - name: 🔨 Compiling Sovereign Arcanus ISO Target Build
        run: |
          # Execute the master compilation macro sequence via the optimized makefile
          sudo make ARCH=amd64

      - name: 📦 Archiving Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcanus-os-debian-iso
          path: output/arcanus-os-live-amd64.iso
          if-no-files-found: error
          retention-days: 5
